<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <!-- Shadow for Depth -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Outer Rounded Card -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Clean Dealership/Distribution Icon (Stylized D + Logistics Arrow + Nodes) -->
  <g filter="url(#shadow)">
    <!-- Outer D-shape curve representing Dealership/Distribution boundary -->
    <path d="M170 130 H 280 C 360 130, 400 170, 400 256 C 400 342, 360 382, 280 382 H 170 Z" fill="none" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Dynamic Logistics Arrow representing supply chain -->
    <path d="M220 190 L 290 256 L 220 322" fill="none" stroke="#FFFFFF" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Distribution Node connections -->
    <circle cx="170" cy="130" r="22" fill="#FFFFFF" />
    <circle cx="170" cy="382" r="22" fill="#FFFFFF" />
    <circle cx="290" cy="256" r="22" fill="#FFFFFF" />
  </g>
</svg>